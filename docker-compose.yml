name: twicome

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "${COMPOSE_MYSQL_ROOT_PASSWORD:-rootpass}"
      MYSQL_DATABASE: "${COMPOSE_MYSQL_DATABASE:-appdb}"
      MYSQL_USER: "${COMPOSE_MYSQL_USER:-appuser}"
      MYSQL_PASSWORD: "${COMPOSE_MYSQL_PASSWORD:-apppass}"
    # DB はホストへ公開せず、同一 Compose ネットワーク内から参照する
    expose:
      - "3306"
    volumes:
      - mysql8_honban_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - backend

  migrate:
    build:
      context: ./migrate
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "${COMPOSE_DATABASE_URL:-mysql+pymysql://appuser:apppass@db:3306/appdb?charset=utf8mb4}"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_honban_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  morpheme-api:
    profiles: [morpheme]
    build:
      context: ./morpheme-api
      dockerfile: Dockerfile
    expose:
      - "8200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8200/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - backend

  faiss-api:
    profiles: [faiss]
    build:
      context: ./faiss-api
      dockerfile: Dockerfile
    environment:
      DATA_DIR: /app/data/faiss_data
      FAISS_CONFIG_PATH: /app/data/faiss_config.json
      EMBEDDING_MODEL: cl-nagoya/sup-simcse-ja-base
    volumes:
      - ./data/honban:/app/data
      - hf-cache:/root/.cache/huggingface
    expose:
      - "8100"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8100/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - backend

  app:
    build: ./app
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      DEFAULT_PLATFORM: twitch
      # ROOT_PATH: /
      DATABASE_URL: "${COMPOSE_DATABASE_URL:-mysql+pymysql://appuser:apppass@db:3306/appdb?charset=utf8mb4}"
      MYSQL_HOST: "${COMPOSE_MYSQL_HOST:-db}"
      MYSQL_PORT: "${COMPOSE_MYSQL_PORT:-3306}"
      MYSQL_USER: "${COMPOSE_MYSQL_USER:-appuser}"
      MYSQL_PASSWORD: "${COMPOSE_MYSQL_PASSWORD:-apppass}"
      MYSQL_DATABASE: "${COMPOSE_MYSQL_DATABASE:-appdb}"
      FAISS_API_URL: "http://faiss-api:8100"
      MORPHEME_API_URL: "http://morpheme-api:8200"
      REDIS_URL: "redis://redis:6379/0"
      FORWARDED_ALLOW_IPS: "${FORWARDED_ALLOW_IPS:-127.0.0.1}"
    volumes:
      # - ./app:/app
      - ./data/honban:/host # 主にtargetusers.csvのため
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - backend
    dns:
      - 1.1.1.1
      - 8.8.8.8

  batch:
    build:
      context: .
      dockerfile: batch/Dockerfile
    env_file:
      - ./.env
    environment:
      DATABASE_URL: "${COMPOSE_DATABASE_URL:-mysql+pymysql://appuser:apppass@db:3306/appdb?charset=utf8mb4}"
      MYSQL_HOST: "${COMPOSE_MYSQL_HOST:-db}"
      MYSQL_PORT: "${COMPOSE_MYSQL_PORT:-3306}"
      MYSQL_USER: "${COMPOSE_MYSQL_USER:-appuser}"
      MYSQL_PASSWORD: "${COMPOSE_MYSQL_PASSWORD:-apppass}"
      MYSQL_DATABASE: "${COMPOSE_MYSQL_DATABASE:-appdb}"
      PROJECT_ROOT: /app
      APP_ENV: honban
      FAISS_API_URL: "http://faiss-api:8100"
      FAISS_CONFIG_PATH: /app/data/honban/faiss_config.json
      MORPHEME_API_URL: "http://morpheme-api:8200"
      REDIS_URL: "redis://redis:6379/0"
    volumes:
      - ./data/honban:/app/data/honban
      - ./.env:/app/.env:ro
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      faiss-api:
        condition: service_healthy
        required: false
      morpheme-api:
        condition: service_healthy
        required: false
    networks:
      - backend
    dns:
      - 1.1.1.1
      - 8.8.8.8

volumes:
  hf-cache:
  mysql8_honban_data:
  redis_honban_data:

networks:
  backend:
    driver: bridge
