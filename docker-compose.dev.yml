name: twicome_dev

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "${COMPOSE_MYSQL_ROOT_PASSWORD:-rootpass}"
      MYSQL_DATABASE: "${COMPOSE_MYSQL_DATABASE:-appdb_dev}"
      MYSQL_USER: "${COMPOSE_MYSQL_USER:-appuser}"
      MYSQL_PASSWORD: "${COMPOSE_MYSQL_PASSWORD:-apppass}"
      TEST_MYSQL_DATABASE: "${COMPOSE_TEST_MYSQL_DATABASE:-appdb_test}"
    # DB はホストへ公開せず、同一 Compose ネットワーク内から参照する
    expose:
      - "3306"
    volumes:
      - mysql8_dev_data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - >
          mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent &&
          mysql -uroot -p$$MYSQL_ROOT_PASSWORD -e "
          CREATE DATABASE IF NOT EXISTS \`$$TEST_MYSQL_DATABASE\` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
          GRANT ALL PRIVILEGES ON \`$$TEST_MYSQL_DATABASE\`.* TO '$$MYSQL_USER'@'%';
          FLUSH PRIVILEGES;
          "
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - backend

  migrate:
    build:
      context: ./migrate
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "${COMPOSE_DATABASE_URL:-mysql+pymysql://appuser:apppass@db:3306/appdb_dev?charset=utf8mb4}"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_dev_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  faiss-api:
    profiles: [faiss]
    build:
      context: ./faiss-api
      dockerfile: Dockerfile
    environment:
      DATA_DIR: /app/data/faiss_data
      FAISS_CONFIG_PATH: /app/data/faiss_config.json
      EMBEDDING_MODEL: cl-nagoya/sup-simcse-ja-base
    volumes:
      - ./data/development:/app/data
      - hf-cache:/root/.cache/huggingface
    expose:
      - "8100"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8100/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - backend

  app:
    build: ./app
    ports:
      - "8011:8000"
    env_file:
      - ./.env.development
    environment:
      DEFAULT_PLATFORM: twitch
      ROOT_PATH: /
      DATABASE_URL: "${COMPOSE_DATABASE_URL:-mysql+pymysql://appuser:apppass@db:3306/appdb_dev?charset=utf8mb4}"
      MYSQL_HOST: "${COMPOSE_MYSQL_HOST:-db}"
      MYSQL_PORT: "${COMPOSE_MYSQL_PORT:-3306}"
      MYSQL_USER: "${COMPOSE_MYSQL_USER:-appuser}"
      MYSQL_PASSWORD: "${COMPOSE_MYSQL_PASSWORD:-apppass}"
      MYSQL_DATABASE: "${COMPOSE_MYSQL_DATABASE:-appdb_dev}"
      FAISS_API_URL: "http://faiss-api:8100"
      REDIS_URL: "redis://redis:6379/0"
    volumes:
      - ./app:/app
      - ./data/development:/host
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - backend
    dns:
      - 1.1.1.1
      - 8.8.8.8

  batch:
    build:
      context: .
      dockerfile: batch/Dockerfile
    env_file:
      - ./.env.development
    environment:
      DATABASE_URL: "${COMPOSE_DATABASE_URL:-mysql+pymysql://appuser:apppass@db:3306/appdb_dev?charset=utf8mb4}"
      MYSQL_HOST: "${COMPOSE_MYSQL_HOST:-db}"
      MYSQL_PORT: "${COMPOSE_MYSQL_PORT:-3306}"
      MYSQL_USER: "${COMPOSE_MYSQL_USER:-appuser}"
      MYSQL_PASSWORD: "${COMPOSE_MYSQL_PASSWORD:-apppass}"
      MYSQL_DATABASE: "${COMPOSE_MYSQL_DATABASE:-appdb_dev}"
      PROJECT_ROOT: /app
      APP_ENV: development
      FAISS_API_URL: "http://faiss-api:8100"
      FAISS_CONFIG_PATH: /app/data/development/faiss_config.json
      REDIS_URL: "redis://redis:6379/0"
    volumes:
      - ./data/development:/app/data/development
      - ./.env.development:/app/.env.development:ro
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      faiss-api:
        condition: service_healthy
        required: false
    networks:
      - backend
    dns:
      - 1.1.1.1
      - 8.8.8.8

  # ── テスト実行用サービス ────────────────────────────────────────────────────
  # 使い方:
  #   通常テスト:      docker compose -f docker-compose.dev.yml run --rm test
  #   ユニットのみ:    docker compose -f docker-compose.dev.yml run --rm test pytest tests/unit
  #   統合テストのみ:  docker compose -f docker-compose.dev.yml run --rm test pytest tests/integration
  test:
    profiles: [test]
    build: ./app
    environment:
      TEST_DATABASE_URL: "mysql+pymysql://${COMPOSE_MYSQL_USER:-appuser}:${COMPOSE_MYSQL_PASSWORD:-apppass}@db:3306/${COMPOSE_TEST_MYSQL_DATABASE:-appdb_test}?charset=utf8mb4"
      MYSQL_HOST: "db"
      MYSQL_PORT: "3306"
      MYSQL_USER: "${COMPOSE_MYSQL_USER:-appuser}"
      MYSQL_PASSWORD: "${COMPOSE_MYSQL_PASSWORD:-apppass}"
      REDIS_URL: ""
      FAISS_API_URL: ""
      HOST_CHECK_ENABLED: "false"
      ROOT_PATH: ""
    volumes:
      - ./app:/app
      - ./migrate:/migrate:ro
    working_dir: /app
    command: ["pytest"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

  # ── Lint 実行用サービス（repo ルート全体を対象）─────────────────────────────
  # 使い方:
  #   lint:           docker compose -f docker-compose.dev.yml run --rm lint
  #   html lint:      docker compose -f docker-compose.dev.yml run --rm lint-html
  #   html strict:    docker compose -f docker-compose.dev.yml run --rm lint-html djlint app/templates --lint
  #   format 確認:    docker compose -f docker-compose.dev.yml run --rm lint ruff format . --check
  #   自動修正:       docker compose -f docker-compose.dev.yml run --rm lint ruff check . --fix
  #   JS lint:        docker compose -f docker-compose.dev.yml run --rm lint-js
  #   JS 自動修正:    docker compose -f docker-compose.dev.yml run --rm lint-js npx eslint app/static/js/ --fix
  lint:
    profiles: [lint]
    build: ./app
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: ["ruff", "check", "."]

  lint-html:
    profiles: [lint]
    build: ./app
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: ["djlint", "app/templates", "--lint", "--warn"]

  lint-js:
    profiles: [lint]
    image: node:lts-alpine
    volumes:
      - .:/workspace
      - eslint-node-modules:/workspace/node_modules
    working_dir: /workspace
    command: sh -c "npm install --silent && npx eslint app/static/js/"

  # ── UI テスト実行用サービス（Playwright / Chromium）─────────────────────────
  # 使い方:
  #   UI テスト全体:   docker compose -f docker-compose.dev.yml run --rm test-ui
  #   特定ファイル:    docker compose -f docker-compose.dev.yml run --rm test-ui pytest tests/ui/test_index_page.py -v
  #
  # Playwright は --with-deps で Chromium のシステム依存もインストール済み。
  # 初回ビルドはダウンロードがあるため数分かかる。
  test-ui:
    profiles: [test-ui]
    build:
      context: ./app
      dockerfile: Dockerfile.test-ui
    environment:
      TEST_DATABASE_URL: "mysql+pymysql://${COMPOSE_MYSQL_USER:-appuser}:${COMPOSE_MYSQL_PASSWORD:-apppass}@db:3306/${COMPOSE_TEST_MYSQL_DATABASE:-appdb_test}?charset=utf8mb4"
      MYSQL_HOST: "db"
      MYSQL_PORT: "3306"
      MYSQL_USER: "${COMPOSE_MYSQL_USER:-appuser}"
      MYSQL_PASSWORD: "${COMPOSE_MYSQL_PASSWORD:-apppass}"
      REDIS_URL: ""
      FAISS_API_URL: ""
      HOST_CHECK_ENABLED: "false"
      ROOT_PATH: ""
    volumes:
      - ./app:/app
      - ./migrate:/migrate:ro
    working_dir: /app
    command: ["pytest", "tests/ui", "-v"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

volumes:
  hf-cache:
  mysql8_dev_data:
  redis_dev_data:
  eslint-node-modules:

networks:
  backend:
    driver: bridge
