<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>twicome - ツイコメ - オフライン</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0e0e10;
        color: #efeff1;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        background: #18181b;
        border-radius: 16px;
        padding: 40px 32px;
        max-width: 400px;
        width: 100%;
        text-align: center;
        border: 1px solid #2f2f35;
      }
      .icon { font-size: 3rem; margin-bottom: 20px; }
      h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 12px; }
      p { color: #adadb8; font-size: 0.9rem; line-height: 1.6; margin-bottom: 24px; }
      .btn {
        display: inline-block;
        background: linear-gradient(135deg, #9147ff 0%, #5c16c5 100%);
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 12px 24px;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">&#128267;</div>
      <h1>オフラインです</h1>
      <p>
        インターネット接続がありません。<br>
        このページはキャッシュされていないため表示できません。<br>
        オンラインに戻ってから再度お試しください。
      </p>
      <button class="btn" onclick="location.reload()">再読み込み</button>
    </div>
  </body>
</html>
