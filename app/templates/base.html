<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{% block title %}ツイコメ{% endblock %}</title>
    {% include "partials/_head_meta_icons.html" %}
    {% block extra_head %}{% endblock %}
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;800&display=swap" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="{{ root_path }}/static/css/base.css?v={{ static_version }}" />
    {% block page_css %}{% endblock %}
    {% block styles %}{% endblock %}
  </head>
  <body>
    {% block body %}{% endblock %}
    {% block scripts %}{% endblock %}
    <script type="application/json" id="app-root-path">{{ root_path | tojson }}</script>
    {% block sw_script %}
    <script src="{{ root_path }}/static/js/base.js?v={{ static_version }}"></script>
    {% endblock %}
  </body>
</html>
