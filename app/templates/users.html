{% extends "base.html" %}

{% block title %}ユーザ一覧 - ツイコメ{% endblock %}

{% block page_css %}
<link rel="stylesheet" href="{{ root_path }}/static/css/users.css?v={{ static_version }}" />
{% endblock %}

{% block body %}

<div class="page-header">
  <div class="page-header-inner">
    <a class="page-back nav-link" href="{{ root_path }}/">&#8592; トップ</a>
    <h1 class="page-title">&#128100; ユーザ一覧</h1>
  </div>
</div>

<div class="users-container">

  <div class="users-toolbar card">

    {% if streamers %}
    <div class="filter-bar">
      <div class="filter-item">
        <label for="streamer-filter">配信者で絞り込み</label>
        <select id="streamer-filter" class="filter-select">
          <option value="">すべての配信者</option>
          {% for s in streamers %}
          <option value="{{ s.login }}">{{ s.display_name or s.login }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="filter-item">
        <label for="sort-select">並び順</label>
        <select id="sort-select" class="filter-select">
          <option value="login">アルファベット順</option>
          <option value="count_desc">コメント数が多い順</option>
          <option value="count_asc">コメント数が少ない順</option>
          <option value="recent">最近活動した順</option>
        </select>
      </div>
    </div>
    {% endif %}

    <div class="users-search-row">
      <div class="users-search-wrapper">
        <input
          id="users-search"
          class="users-search-input"
          type="search"
          placeholder="IDまたは表示名で検索"
          autocomplete="off"
          spellcheck="false"
        />
        <button type="button" id="users-search-clear" class="users-search-clear" aria-label="クリア">&#x2715;</button>
      </div>
      <div id="users-count" class="users-count"></div>
    </div>

  </div>

  <div id="users-status" class="users-status" hidden></div>

  <div id="users-grid" class="users-grid" role="list"></div>

</div>

<script type="application/json" id="root-path-data">{{ root_path | tojson }}</script>
<script src="{{ root_path }}/static/js/users.js?v={{ static_version }}"></script>

{% endblock %}

{% block sw_script %}{% endblock %}
