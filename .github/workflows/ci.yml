name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - CICD

jobs:
  # ── ユニットテスト（DB不要、高速） ──────────────────────────────────────────
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run unit tests
        working-directory: app
        env:
          DATABASE_URL: "mysql+pymysql://dummy:dummy@localhost:3306/dummy"
        run: pytest tests/unit -v

  # ── マイグレーション確認 ────────────────────────────────────────────────────
  migration:
    name: Migration Check
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: appdb_ci
          MYSQL_USER: appuser
          MYSQL_PASSWORD: apppass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uappuser -papppass --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    env:
      DATABASE_URL: mysql+pymysql://appuser:apppass@127.0.0.1:3306/appdb_ci?charset=utf8mb4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install migration dependencies
        run: pip install -r migrate/requirements.txt

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 60); do
            python -c "import pymysql; pymysql.connect(host='127.0.0.1', port=3306, user='appuser', password='apppass', database='appdb_ci').close()" && exit 0
            sleep 2
          done
          echo "MySQL did not become ready in time" >&2
          exit 1

      - name: Run migrations
        run: alembic -c migrate/alembic.ini upgrade head

      - name: Verify schema
        run: python migrate/check_schema.py

  # ── 統合テスト（MySQL使用） ──────────────────────────────────────────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: migration

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: appdb_test
          MYSQL_USER: appuser
          MYSQL_PASSWORD: apppass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uappuser -papppass --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r app/requirements.txt -r migrate/requirements.txt

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 60); do
            python -c "import pymysql; pymysql.connect(host='127.0.0.1', port=3306, user='appuser', password='apppass', database='appdb_test').close()" && exit 0
            sleep 2
          done
          echo "MySQL did not become ready in time" >&2
          exit 1

      - name: Run integration tests
        working-directory: app
        env:
          TEST_DATABASE_URL: mysql+pymysql://appuser:apppass@127.0.0.1:3306/appdb_test?charset=utf8mb4
        run: pytest tests/integration -v
