name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - CICD

jobs:
  # ── 軽量 broken code detection（構文エラー検知） ────────────────────────────
  compile-check:
    name: Compile Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax compile Python files
        run: |
          python - <<'PY'
          from pathlib import Path

          roots = [
              Path("app"),
              Path("batch"),
              Path("migrate"),
              Path("util"),
              Path("mcp-server"),
              Path("faiss-api"),
          ]

          count = 0
          errors = []
          for root in roots:
              for path in root.rglob("*.py"):
                  count += 1
                  try:
                      compile(path.read_text(encoding="utf-8"), str(path), "exec")
                  except Exception as exc:
                      errors.append(f"{path}: {exc}")

          if errors:
              raise SystemExit("\n".join(errors))

          print(f"syntax compile ok: {count} files")
          PY

  # ── ユニットテスト（DB不要、高速） ──────────────────────────────────────────
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run unit tests
        working-directory: app
        env:
          DATABASE_URL: "mysql+pymysql://dummy:dummy@localhost:3306/dummy"
          COVERAGE_FILE: .coverage.unit
        run: |
          mkdir -p test-reports/unit
          pytest tests/unit -v \
            --junitxml=test-reports/unit/junit.xml \
            --cov=. \
            --cov-config=.coveragerc \
            --cov-report=

      - name: Upload unit test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-artifacts
          path: |
            app/.coverage.unit
            app/test-reports/unit/junit.xml
          if-no-files-found: warn
          retention-days: 14

  # ── マイグレーション確認 ────────────────────────────────────────────────────
  migration:
    name: Migration Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: appdb_ci
          MYSQL_USER: appuser
          MYSQL_PASSWORD: apppass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uappuser -papppass --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    env:
      DATABASE_URL: mysql+pymysql://appuser:apppass@127.0.0.1:3306/appdb_ci?charset=utf8mb4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: migrate/requirements.txt

      - name: Install migration dependencies
        run: pip install -r migrate/requirements.txt

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 60); do
            python -c "import pymysql; pymysql.connect(host='127.0.0.1', port=3306, user='appuser', password='apppass', database='appdb_ci').close()" && exit 0
            sleep 2
          done
          echo "MySQL did not become ready in time" >&2
          exit 1

      - name: Run migrations
        run: alembic -c migrate/alembic.ini upgrade head

      - name: Verify schema
        run: python migrate/check_schema.py

  # ── 統合テスト（MySQL使用） ──────────────────────────────────────────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: migration
    timeout-minutes: 20

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: appdb_test
          MYSQL_USER: appuser
          MYSQL_PASSWORD: apppass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uappuser -papppass --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            app/requirements.txt
            migrate/requirements.txt

      - name: Install dependencies
        run: pip install -r app/requirements.txt -r migrate/requirements.txt

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 60); do
            python -c "import pymysql; pymysql.connect(host='127.0.0.1', port=3306, user='appuser', password='apppass', database='appdb_test').close()" && exit 0
            sleep 2
          done
          echo "MySQL did not become ready in time" >&2
          exit 1

      - name: Run integration tests
        working-directory: app
        env:
          TEST_DATABASE_URL: mysql+pymysql://appuser:apppass@127.0.0.1:3306/appdb_test?charset=utf8mb4
          COVERAGE_FILE: .coverage.integration
        run: |
          mkdir -p test-reports/integration
          pytest tests/integration -v \
            --junitxml=test-reports/integration/junit.xml \
            --cov=. \
            --cov-config=.coveragerc \
            --cov-report=

      - name: Upload integration test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-artifacts
          path: |
            app/.coverage.integration
            app/test-reports/integration/junit.xml
          if-no-files-found: warn
          retention-days: 14

  # ── app-only カバレッジ集計とテストレポート収集 ─────────────────────────────
  coverage-summary:
    name: Coverage Summary
    runs-on: ubuntu-latest
    needs:
      - unit-test
      - integration-test
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Download unit test artifacts
        uses: actions/download-artifact@v4
        with:
          name: unit-test-artifacts
          path: app/.ci-artifacts/unit

      - name: Download integration test artifacts
        uses: actions/download-artifact@v4
        with:
          name: integration-test-artifacts
          path: app/.ci-artifacts/integration

      - name: Combine coverage and build reports
        working-directory: app
        run: |
          mkdir -p test-reports/combined
          coverage combine .ci-artifacts/unit .ci-artifacts/integration
          coverage report | tee test-reports/combined/coverage.txt
          coverage xml -o test-reports/combined/coverage.xml
          cp .ci-artifacts/unit/test-reports/unit/junit.xml test-reports/combined/junit-unit.xml
          cp .ci-artifacts/integration/test-reports/integration/junit.xml test-reports/combined/junit-integration.xml
          {
            echo "## Coverage Summary"
            echo
            echo '```text'
            cat test-reports/combined/coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload combined reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports
          path: |
            app/test-reports/combined/coverage.xml
            app/test-reports/combined/coverage.txt
            app/test-reports/combined/junit-unit.xml
            app/test-reports/combined/junit-integration.xml
          if-no-files-found: warn
          retention-days: 14
